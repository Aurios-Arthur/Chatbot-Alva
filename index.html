<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Chatbot em Javascript | Unifasar</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--Link do Google Fonts para Icones-->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0"/>
    <script src="scripts.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="logo">ALVA</div>
        <nav>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#anxiety">Controle de Ansiedade</a></li>
                <li><a href="#meditation">Meditação Guiada</a></li>
                <li><a href="#motivation">Mensagens de Motivação</a></li>
                <li><a href="#help">Ajuda Imediata</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <!-- O conteúdo das rotas será carregado aqui -->
    </main>
    
    <footer class="footer">
        <p> &copy; 2025 Unifasar</p>
    </footer>

    <button class="chatbot-toggler">
        <span class="material-symbols-outlined">mode_comment</span>
        <span class="material-symbols-outlined">close</span>
    </button>
    <div class="chatbot">
        <header>
            <h2>ALVA</h2>
            <span class="material-symbols-outlined">close</span>
        </header>
        <ul class="chatbox">
            <li class="chat incoming">
                <span class="material-symbols-outlined">smart_toy</span>
                <p>Olá! 😊 <br>Como eu posso te ajudar hoje? </p>
            </li>
        </ul>
        
        <div class="chat-input">
            <textarea placeholder="Insira uma menssagem..." required></textarea>
            <span id="send-btn" class="material-symbols-outlined">send</span>
        </div>
    </div>
</body>
</html>
